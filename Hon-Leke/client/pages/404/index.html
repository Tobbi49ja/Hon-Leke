<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Hon. Leke Abejide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.png">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, var(--primary) 0%, #2d5f8a 100%);
      color: white;
      padding: 40px 20px;
    }
    .error-inner { max-width: 500px; }
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .error-inner h2 {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 16px;
      color: white;
    }
    .error-inner p { opacity: 0.8; font-size: 1rem; margin-bottom: 32px; line-height: 1.7; }
    .error-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .error-links a {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-white { background: white; color: var(--primary); }
    .btn-white:hover { background: var(--accent); color: white; }
    .btn-ghost { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
    .btn-ghost:hover { background: rgba(255,255,255,0.25); }
    .error-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.6; }
  </style>
</head>
<body style="padding:0;margin:0">
  <div class="error-page">
    <div class="error-inner">
      <div class="error-icon"><i class="bi bi-map"></i></div>
      <div class="error-code">404</div>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-links">
        <a href="/" class="btn-white">← Back to Blog</a>
        <a href="/about" class="btn-ghost">About</a>
        <a href="/contact" class="btn-ghost">Contact</a>
      </div>
    </div>
  </div>
</body>
</html>
