<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/admin/assets/css/admin.css" rel="stylesheet">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand"><h2>Hon. Leke Abejide</h2><p>Admin Panel</p></div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/admin/dashboard" class="nav-link" data-page="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="nav-section">Content</div>
    <a href="/admin/posts" class="nav-link" data-page="posts"><i class="bi bi-newspaper"></i> Blog Posts</a>
    <a href="/admin/posts/new" class="nav-link" data-page="new-post"><i class="bi bi-plus-circle"></i> New Post</a>
    <div class="nav-section">Engagement</div>
    <a href="/admin/comments" class="nav-link" data-page="comments"><i class="bi bi-chat-left-text"></i> Comments</a>
    <a href="/admin/messages" class="nav-link" data-page="messages"><i class="bi bi-envelope"></i> Messages</a>
    <a href="/admin/subscribers" class="nav-link" data-page="subscribers"><i class="bi bi-people"></i> Subscribers</a>
    <div class="nav-section">Site</div>
    <a href="/admin/settings" class="nav-link" data-page="settings"><i class="bi bi-gear"></i> Settings</a>
    <a href="/" target="_blank" class="nav-link"><i class="bi bi-box-arrow-up-right"></i> View Site</a>
  </nav>
  <div class="sidebar-footer"><span id="admin-name">Admin</span> &nbsp;·&nbsp; <a href="#" id="logout-btn">Logout</a></div>
</aside>

<div class="main-content">
  <div class="topbar">
    <h1 id="page-title">Blog Posts</h1>
    <div class="topbar-actions">
      <input type="text" id="search-posts" placeholder="Search posts…" style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.85rem;width:200px;outline:none">
      <select id="filter-category" style="padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.85rem;outline:none">
        <option value="">All Categories</option>
      </select>
      <a href="/admin/posts/new" class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> New Post</a>
      <div class="admin-avatar" id="admin-avatar">A</div>
    </div>
  </div>

  <div class="page-body">
    <div class="card">
      <div class="card-header">
        <h3><i class="bi bi-newspaper"></i> All Posts <span id="posts-count" style="font-weight:400;color:var(--muted)"></span></h3>
      </div>
      <div class="card-body" style="padding:0">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Date</th>
              <th>Video</th>
              <th>Featured</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="posts-table">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:#718096">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="/admin/assets/js/layout.js"></script>
<script>
initAdminLayout('Blog Posts', 'posts');

let allPosts = [];

async function loadPosts() {
  const data = await adminAPI.get('/api/admin/posts');
  if (!data) return;
  allPosts = data.posts;
  // Populate category filter
  const cats = [...new Set(allPosts.map(p => p.category))];
  const catSelect = document.getElementById('filter-category');
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    catSelect.appendChild(opt);
  });
  renderPosts(allPosts);
}

function renderPosts(posts) {
  const tbody = document.getElementById('posts-table');
  document.getElementById('posts-count').textContent = `(${posts.length})`;
  if (!posts.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#718096">No posts found.</td></tr>';
    return;
  }
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td>${p.image ? `<img src="/${p.image}" class="post-thumb" onerror="this.parentElement.innerHTML='<div style=width:52px;height:40px;background:#eee;border-radius:6px></div>'">` : '<div style="width:52px;height:40px;background:#eee;border-radius:6px"></div>'}</td>
      <td style="max-width:280px">
        <span style="font-weight:500;font-size:0.875rem;display:block">${p.title.substring(0,70)}${p.title.length>70?'…':''}</span>
        <span style="font-size:0.75rem;color:#718096;display:block;margin-top:2px">${p.excerpt.substring(0,60)}…</span>
      </td>
      <td><span class="badge badge-info">${p.category}</span></td>
      <td style="color:#718096;font-size:0.8rem;white-space:nowrap">${p.date}</td>
      <td>${p.hasVideo ? '<span class="badge badge-success"><i class="bi bi-camera-video"></i> Yes</span>' : '<span style="color:#ccc;font-size:0.75rem">—</span>'}</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.featured ? 'checked' : ''} onchange="toggleFeatured(${p.id}, this)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td style="white-space:nowrap">
        <a href="/post/${p.id}" target="_blank" class="btn btn-outline btn-sm btn-icon" title="View"><i class="bi bi-eye"></i></a>
        <a href="/admin/posts/edit/${p.id}" class="btn btn-outline btn-sm btn-icon" title="Edit"><i class="bi bi-pencil"></i></a>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deletePost(${p.id})" title="Delete"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function filterPosts() {
  const search = document.getElementById('search-posts').value.toLowerCase();
  const category = document.getElementById('filter-category').value;
  let filtered = allPosts;
  if (search) filtered = filtered.filter(p => p.title.toLowerCase().includes(search) || p.category.toLowerCase().includes(search));
  if (category) filtered = filtered.filter(p => p.category === category);
  renderPosts(filtered);
}

document.getElementById('search-posts').addEventListener('input', filterPosts);
document.getElementById('filter-category').addEventListener('change', filterPosts);

async function toggleFeatured(id, checkbox) {
  const data = await adminAPI.patch(`/api/admin/posts/${id}/featured`);
  if (data) showToast(data.message, data.success ? 'success' : 'error');
  if (!data || !data.success) checkbox.checked = !checkbox.checked;
}

async function deletePost(id) {
  confirmDelete('Delete this post permanently? This cannot be undone.', async () => {
    const data = await adminAPI.delete(`/api/admin/posts/${id}`);
    if (data) showToast(data.message, data.success ? 'success' : 'error');
    if (data && data.success) loadPosts();
  });
}

loadPosts();
</script>
</body>
</html>
